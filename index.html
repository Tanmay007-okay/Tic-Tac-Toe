<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>
<body>
    <h1>Tic-Tac-Toe</h1>

    <div id="scoreboard">
        <div id="scoreBoxX" class="score-box active-player">X Wins: <span id="scoreX">0</span></div>
        <div id="scoreBoxO" class="score-box">O Wins: <span id="scoreO">0</span></div>
    </div>
    
    <div id="board">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
    </div>
    
    <p id="winnerMsg"></p>
    
    <button id="resetBtn">Reset</button>
</body>
</html>
